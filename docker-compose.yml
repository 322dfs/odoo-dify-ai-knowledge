version: '3.8'

services:
  odoo-db:
    image: postgres:15
    container_name: odoo-db
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo123
      - POSTGRES_DB=postgres
    volumes:
      - /opt/odoo/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo-web:
    image: odoo:17
    container_name: odoo-web
    depends_on:
      odoo-db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8071:8071"
    volumes:
      - /opt/odoo/data:/var/lib/odoo
      - /opt/odoo/config:/etc/odoo
      - /opt/odoo/addons:/mnt/extra-addons
    environment:
      - HOST=odoo-db
      - USER=odoo
      - PASSWORD=odoo123
    restart: unless-stopped

networks:
  default:
    name: odoo_network
